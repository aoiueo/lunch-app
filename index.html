<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>池袋ランチ決定くん Premium v2</title>
    <style>
        :root { --main: #e67e22; --accent: #d35400; --bg: #f5f6fa; }
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 検索フォーム */
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        select, button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        button { background: var(--main); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; grid-column: span 2; }
        button:hover { background: var(--accent); }

        /* ガチャ演出用アニメーション */
        .slot-animation { animation: slot-blur 0.1s infinite; opacity: 0.7; color: #95a5a6 !important; }
        @keyframes slot-blur { 
            0% { transform: translateY(-2px); filter: blur(1px); }
            50% { transform: translateY(2px); filter: blur(2px); }
            100% { transform: translateY(-2px); filter: blur(1px); }
        }
        .pop-in { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 結果表示レイアウト */
        #result-container { display: none; margin-top: 20px; }
        .result-layout { display: flex; flex-wrap: wrap; gap: 20px; text-align: left; }
        .info-panel { flex: 1; min-width: 300px; }
        .map-panel { flex: 1; min-width: 300px; height: 350px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        
        .shop-name { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .budget-icon { display: inline-block; background: #f1f2f6; color: #2f3542; padding: 2px 8px; border-radius: 8px; font-size: 0.9rem; margin-left: 10px; vertical-align: middle; border: 1px solid #ced4da; }
        .recommend-box { background: #fff9f0; border-left: 5px solid var(--main); padding: 10px 15px; margin: 15px 0; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; margin-right: 5px; background: #eee; }
        .status-open { color: #27ae60; font-weight: bold; }
        .status-closed { color: #e74c3c; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 600px) {
            .search-grid { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .result-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0; color:var(--main);">📍 池袋1丁目ランチ プレミアム v2</h2>
        <div class="search-grid">
            <div>
                <label>ジャンル</label>
                <select id="category">
                    <option value="any">なんでも</option>
                    <option value="定食">🍚 定食・お米</option>
                    <option value="ラーメン">🍜 ラーメン・つけ麺</option>
                    <option value="中華">🐼 中華・エスニック</option>
                    <option value="ヘルシー">🥗 ヘルシー・和食</option>
                    <option value="カフェ">☕ カフェ・パン</option>
                    <option value="クイック">⚡ 早い・安い</option>
                </select>
            </div>
            <div>
                <label>今の気分</label>
                <select id="mood">
                    <option value="any">なんでも</option>
                    <option value="がっつり">🔥 がっつり</option>
                    <option value="あっさり">🍃 あっさり</option>
                </select>
            </div>
            <div>
                <label>距離</label>
                <select id="distance">
                    <option value="any">指定なし</option>
                    <option value="近場">近場（5分以内）</option>
                    <option value="遠出">少し歩く（10分〜）</option>
                </select>
            </div>
            <div>
                <label>予算</label>
                <select id="budget">
                    <option value="any">指定なし</option>
                    <option value="1000">1,000円以内</option>
                    <option value="1500">1,500円以内</option>
                    <option value="2000">2,000円以上</option>
                </select>
            </div>
            <button onclick="decideLunch()">運命の1店をガチャで決める！</button>
        </div>
        <div id="history-info" style="font-size: 0.7rem; color: #999; text-align: center;"></div>
    </div>

    <div id="result-container" class="card">
        <div class="result-layout">
            <div class="info-panel">
                <div id="status"></div>
                <div id="result-name" class="shop-name"></div>
                <div id="tags"></div>
                <div class="recommend-box">
                    <div style="font-size: 0.8rem; color: #e67e22; font-weight: bold;">🌟 おすすめメニュー</div>
                    <div id="recommend-menu" style="font-size: 1.1rem; margin-top: 5px;"></div>
                </div>
                <div id="result-time" style="font-size: 0.9rem; color: #666;"></div>
                <button onclick="resetHistory()" style="background:#999; margin-top:20px; padding:8px; font-size: 0.7rem; grid-column: auto;">履歴をリセット</button>
            </div>
            <div class="map-panel" id="map-area"></div>
        </div>
    </div>
</div>

<script>
    // 1. データベース：priceをminとmaxに分割
    const shops = [
    { name: "竈門ご飯一穀 池袋西口店", cat: "定食", sub: "あっさり", menu: "一穀定食", dist: "近場", min: 1000, max: 2000, open: 11, close: 22 },
    { name: "ナポリの下町食堂池袋店", cat: "イタリアン", sub: "あっさり", menu: "サラダ付きパスタランチ", dist: "近場", min: 1000, max: 2000, open: 11, close: 22 },
    { name: "イケチカ ダイニング", cat: "定食", sub: "あっさり", menu: "蕎麦とおつまみセット", dist: "近場", min: 1000, max: 2000, open: 11, close: 23 },
    { name: "湘聚・湖南菜館", cat: "中華", sub: "がっつり", menu: "本場の中華料理", dist: "近場", min: 1500, max: 3000, open: 11, close: 23 },
    { name: "金のイタリアン", cat: "イタリアン", sub: "あっさり", menu: "洗練されたパスタランチ", dist: "遠出", min: 1000, max: 2500, open: 11, close: 22 },
    { name: "ランチハウス ミトヤ", cat: "定食", sub: "がっつり", menu: "とんかつ定食", dist: "近場", min: 800, max: 1000, open: 11, close: 22 },
    { name: "楽楽屋 池袋本店", cat: "中華", sub: "がっつり", menu: "選べる中華ランチ", dist: "近場", min: 800, max: 1500, open: 11, close: 23 },
    { name: "ブラッスリー レトン", cat: "フランス料理", sub: "あっさり", menu: "コースランチ", dist: "近場", min: 2000, max: 4000, open: 11, close: 21 },
    { name: "北海道イタリアンミアボッカ", cat: "イタリアン", sub: "あっさり", menu: "北海道食材パスタ", dist: "近場", min: 2000, max: 3000, open: 11, close: 22 },
    { name: "あんぷく池袋店", cat: "うどん", sub: "あっさり", menu: "名物カルボナーラうどん", dist: "近場", min: 1000, max: 2000, open: 11, close: 22 },
    { name: "大かまど飯 寅福", cat: "定食", sub: "あっさり", menu: "大かまど飯定食", dist: "近場", min: 1000, max: 2000, open: 11, close: 22 },
    { name: "トロ政 池袋店", cat: "和食", sub: "がっつり", menu: "海鮮丼ランチ", dist: "近場", min: 1000, max: 2500, open: 11, close: 22 },
    { name: "沖縄食堂 やんばる池袋店", cat: "和食", sub: "あっさり", menu: "ソーキそば", dist: "遠出", min: 800, max: 1200, open: 11, close: 23 },
    { name: "洋庖丁 池袋店", cat: "定食", sub: "がっつり", menu: "スタミナ焼きランチ", dist: "近場", min: 800, max: 1000, open: 11, close: 21 },
    { name: "TOMBOY 池袋東口店", cat: "カレー", sub: "がっつり", menu: "本格インドカレー", dist: "遠出", min: 1000, max: 2000, open: 11, close: 23 },
    { name: "爽亭 JR池袋駅店", cat: "クイック", sub: "あっさり", menu: "かき揚げそば", dist: "近場", min: 400, max: 800, open: 7, close: 23 },
    { name: "みなと", cat: "和食", sub: "がっつり", menu: "ガッツリ海鮮丼", dist: "近場", min: 1000, max: 2000, open: 11, close: 22 },
    { name: "びすとろ UOKIN 池袋", cat: "ビストロ", sub: "あっさり", menu: "魚金の洋食ランチ", dist: "近場", min: 1200, max: 2500, open: 11, close: 23 },
    { name: "一心", cat: "定食", sub: "がっつり", menu: "チーズメンチカツ定食", dist: "近場", min: 800, max: 1000, open: 11, close: 21 },
    { name: "かえる食堂", cat: "カレー", sub: "がっつり", menu: "手作りカレー", dist: "遠出", min: 900, max: 1200, open: 11, close: 15 }
];
    
    function decideLunch() {
        const cat = document.getElementById('category').value;
        const mood = document.getElementById('mood').value;
        const dist = document.getElementById('distance').value;
        const budget = document.getElementById('budget').value;
        
        let history = JSON.parse(sessionStorage.getItem('lunch_history') || "[]");

        // 2. 検索ロジック：min価格で判定するように修正
        let filtered = shops.filter(s => {
            const matchCat = (cat === 'any' || s.cat === cat);
            const matchMood = (mood === 'any' || s.sub === mood);
            const matchDist = (dist === 'any' || s.dist === dist);
            // 予算の判定（s.price を s.min に変更）
            const matchBudget = (budget === 'any' || s.min <= parseInt(budget) || (budget === "2000" && s.min >= 2000));
            const notVisited = !history.includes(s.name);
            return matchCat && matchMood && matchDist && matchBudget && notVisited;
        });

        if (filtered.length === 0) {
            filtered = shops.filter(s => (cat === 'any' || s.cat === cat) && (mood === 'any' || s.sub === mood));
            if(filtered.length > 0) alert("未訪問店を一周しました！全リストから再抽選します。");
            else { alert("条件に合うお店がありません！"); return; }
        }

        const nameDisplay = document.getElementById('result-name');
        document.getElementById('result-container').style.display = 'block';
        nameDisplay.classList.remove('pop-in');
        nameDisplay.classList.add('slot-animation'); 
        
        let count = 0;
        const slotTimer = setInterval(() => {
            const randomFake = shops[Math.floor(Math.random() * shops.length)];
            nameDisplay.innerText = randomFake.name;
            count++;

            if (count > 15) {
                clearInterval(slotTimer);
                nameDisplay.classList.remove('slot-animation');
                const chosen = filtered[Math.floor(Math.random() * filtered.length)];
                history.push(chosen.name);
                sessionStorage.setItem('lunch_history', JSON.stringify(history));
                nameDisplay.classList.add('pop-in');
                displayResult(chosen);
                updateHistoryCount(history.length);
            }
        }, 80);
    }

    // 3. 表示部分：円マーク計算を廃止し、min〜max表示へ
    function displayResult(shop) {
        // 価格表示を「800円〜1,100円」の形式に整形
        const priceRange = `${shop.min.toLocaleString()}円〜${shop.max.toLocaleString()}円`;
        
        document.getElementById('result-name').innerHTML = 
            `${shop.name} <span class="budget-icon" style="background:#2f3542; color:white;">${priceRange}</span>`;
        
        document.getElementById('recommend-menu').innerText = shop.menu;
        
        const hour = new Date().getHours();
        const isOpen = (hour >= shop.open && hour < shop.close);
        document.getElementById('status').innerHTML = isOpen ? '<span class="status-open">● 営業中</span>' : '<span class="status-closed">○ 営業時間外かも</span>';
        document.getElementById('tags').innerHTML = `<span class="tag">${shop.cat}</span><span class="tag">${shop.sub}</span><span class="tag">${shop.dist}</span>`;
        document.getElementById('result-time').innerText = `目安: ${shop.open}:00〜${shop.close}:00`;

        const q = encodeURIComponent(shop.name + " 池袋");
        document.getElementById('map-area').innerHTML = `<iframe src="https://maps.google.co.jp/maps?output=embed&q=${q}"></iframe>`;
        window.scrollTo({ top: document.getElementById('result-container').offsetTop - 20, behavior: 'smooth' });
    }

    function resetHistory() {
        sessionStorage.removeItem('lunch_history');
        location.reload();
    }

    function updateHistoryCount(count) {
        document.getElementById('history-info').innerText = `本日チェックした件数: ${count}件`;
    }

    updateHistoryCount(JSON.parse(sessionStorage.getItem('lunch_history') || "[]").length);
</script>

</body>
</html>
