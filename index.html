        .slot-animation { animation: slot-blur 0.1s infinite; opacity: 0.7; color: #95a5a6 !important; }
        @keyframes slot-blur { 
            0% { transform: translateY(-2px); filter: blur(1px); }
            50% { transform: translateY(2px); filter: blur(2px); }
            100% { transform: translateY(-2px); filter: blur(1px); }
        }
        .pop-in { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #result-container { display: none; margin-top: 20px; }
        .result-layout { display: flex; flex-wrap: wrap; gap: 20px; text-align: left; }
        .info-panel { flex: 1; min-width: 300px; }
        .map-panel { flex: 1; min-width: 300px; height: 350px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        .shop-name { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .budget-icon { display: inline-block; background: #f1f2f6; color: #2f3542; padding: 2px 8px; border-radius: 8px; font-size: 0.9rem; margin-left: 10px; vertical-align: middle; border: 1px solid #ced4da; }
        .recommend-box { background: #fff9f0; border-left: 5px solid var(--main); padding: 10px 15px; margin: 15px 0; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; margin-right: 5px; background: #eee; }
        .status-open { color: #27ae60; font-weight: bold; }
        .status-closed { color: #e74c3c; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
        @media (max-width: 600px) { .search-grid { grid-template-columns: 1fr; } button { grid-column: span 1; } .result-layout { flex-direction: column; } }

</head>

function decideLunch() {
    const cat = document.getElementById('category').value;
    const mood = document.getElementById('mood').value;
    const dist = document.getElementById('distance').value;
    const budget = document.getElementById('budget').value;
    let history = JSON.parse(sessionStorage.getItem('lunch_history') || "[]");
    let filtered = shops.filter(s => {
        const matchCat = (cat === 'any' || s.cat === cat);
        const matchMood = (mood === 'any' || s.sub === mood);
        const matchDist = (dist === 'any' || s.dist === dist);
        const matchBudget = (budget === 'any' || s.min <= parseInt(budget) || (budget === "2000" && s.min >= 2000));
        const notVisited = !history.includes(s.name);
        return matchCat && matchMood && matchDist && matchBudget && notVisited;
    });
    if (filtered.length === 0) {
        filtered = shops.filter(s => (cat === 'any' || s.cat === cat) && (mood === 'any' || s.sub === mood));
        if(filtered.length > 0) alert("未訪問店を一周しました！全リストから再抽選します。");
        else { alert("条件に合うお店がありません！"); return; }
    }
    const nameDisplay = document.getElementById('result-name');
    document.getElementById('result-container').style.display = 'block';
    nameDisplay.classList.remove('pop-in');
    nameDisplay.classList.add('slot-animation'); 
    let count = 0;
    const slotTimer = setInterval(() => {
        const randomFake = shops[Math.floor(Math.random() * shops.length)];
        nameDisplay.innerText = randomFake.name;
        count++;
        if (count > 15) {
            clearInterval(slotTimer);
            nameDisplay.classList.remove('slot-animation');
            const chosen = filtered[Math.floor(Math.random() * filtered.length)];
            history.push(chosen.name);
            sessionStorage.setItem('lunch_history', JSON.stringify(history));
            nameDisplay.classList.add('pop-in');
            displayResult(chosen);
            updateHistoryCount(history.length);
        }
    }, 80);
}

function displayResult(shop) {
    const priceRange = `${shop.min.toLocaleString()}円〜${shop.max.toLocaleString()}円`;
    const ratingVal = shop.rating ? shop.rating.toFixed(1) : "---";
    const starIcons = shop.rating ? "⭐".repeat(Math.floor(shop.rating)) : "評価なし";
    document.getElementById('result-name').innerHTML = `${shop.name} <span class="budget-icon" style="background:#2f3542; color:white;">${priceRange}</span>`;
    document.getElementById('recommend-menu').innerText = shop.menu;
    const hour = new Date().getHours();
    const isOpen = (hour >= shop.open && hour < shop.close);
    document.getElementById('status').innerHTML = isOpen ? '<span class="status-open">● 営業中</span>' : '<span class="status-closed">○ 営業時間外かも</span>';
    document.getElementById('tags').innerHTML = `
        <div style="color: #f1c40f; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px;">${starIcons} ${ratingVal}</div>
        <span class="tag">${shop.cat}</span><span class="tag">${shop.sub}</span><span class="tag">${shop.dist}</span>
    `;
    document.getElementById('result-time').innerText = `目安: ${shop.open}:00〜${shop.close}:00`;
    const q = encodeURIComponent(shop.name + " 池袋");
    document.getElementById('map-area').innerHTML = `<iframe src="https://maps.google.co.jp/maps?output=embed&q=${q}"></iframe>`;
    window.scrollTo({ top: document.getElementById('result-container').offsetTop - 20, behavior: 'smooth' });
}

function resetHistory() { sessionStorage.removeItem('lunch_history'); location.reload(); }
function updateHistoryCount(count) { document.getElementById('history-info').innerText = `本日チェックした件数: ${count}件`; }
</script>
</body>
</html>
