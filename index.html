    <style>
        :root { 
            --black: #000000;
            --dark-gray: #2c3e50;
            --mid-gray: #95a5a6;
            --light-gray: #ecf0f1;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--black); 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
        }

        .sidebar { position: sticky; top: 40px; height: fit-content; }

        header { margin-bottom: 30px; }
        header h1 { font-size: 1.8rem; letter-spacing: 3px; margin: 0; border-left: 5px solid var(--black); padding-left: 15px; }
        header p { font-size: 0.8rem; color: var(--mid-gray); margin: 10px 0 0 20px; }

        .config-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 4px;
            border: 1px solid #eee;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        .search-grid { display: flex; flex-direction: column; gap: 20px; }
        label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: var(--mid-gray); }
        select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 0; 
            font-size: 14px; appearance: none; background: #fff; cursor: pointer;
        }

        .btn-main { 
            background: var(--black); color: white; border: none; 
            padding: 20px; font-size: 1rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { background: #333; }

        #result-container { 
            display: none; 
            background: white;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid #eee;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.02);
            animation: pop-in 0.4s ease-out;
        }

        @keyframes pop-in { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .shop-name { font-size: 2.2rem; font-weight: bold; line-height: 1.1; margin: 0; flex: 1; }
        
        .status-badge { padding: 5px 15px; font-size: 0.7rem; font-weight: bold; border: 1px solid #000; }
        .open { background: #000; color: #fff; }
        .closed { background: #fff; color: #ccc; border-color: #ccc; }

        .rating-stars { color: #f1c40f; font-size: 1.2rem; margin: 10px 0; }
        
        .recommend-box { 
            border-top: 1px solid #eee; border-bottom: 1px solid #eee;
            padding: 20px 0; margin: 20px 0;
        }
        
        .tag { 
            display: inline-block; padding: 4px 12px; border: 1px solid #000;
            font-size: 0.7rem; margin-right: 8px; font-weight: bold;
        }

        .map-panel { 
            width: 100%; height: 450px; 
            background: #eee; margin-top: 20px; 
        }

        .footer-tools { display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }

        #empty-state {
            height: 100%; display: flex; align-items: center; justify-content: center; 
            color: #ccc; border: 2px dashed #ddd; border-radius: 4px;
        }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; padding: 10px; }
            .sidebar { position: static; }
            .shop-name { font-size: 1.6rem; }
            .map-panel { height: 300px; }
        }
    </style>
</head>

function decideLunch() {
    const cat = document.getElementById('category').value;
    const mood = document.getElementById('mood').value;
    const dist = document.getElementById('distance').value;
    const budget = document.getElementById('budget').value;
    
    let history = JSON.parse(sessionStorage.getItem('lunch_history') || "[]");
    let filtered = shops.filter(s => {
        const matchCat = (cat === 'any' || s.cat === cat);
        const matchMood = (mood === 'any' || s.sub === mood);
        const matchDist = (dist === 'any' || s.dist === dist);
        const matchBudget = (budget === 'any' || s.min <= parseInt(budget) || (budget === "2000" && s.min >= 2000));
        const notVisited = !history.includes(s.name);
        return matchCat && matchMood && matchDist && matchBudget && notVisited;
    });

    if (filtered.length === 0) {
        filtered = shops.filter(s => (cat === 'any' || s.cat === cat) && (mood === 'any' || s.sub === mood));
        if(filtered.length > 0) alert("未訪問店を一周しました！");
        else { alert("条件に合うお店がありません！"); return; }
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('result-container').style.display = 'block';
    
    const nameDisplay = document.getElementById('result-name');
    nameDisplay.innerText = "抽選中...";
    
    setTimeout(() => {
        const chosen = filtered[Math.floor(Math.random() * filtered.length)];
        history.push(chosen.name);
        sessionStorage.setItem('lunch_history', JSON.stringify(history));
        displayResult(chosen);
        updateHistoryCount(history.length);
    }, 500);
}

function displayResult(shop) {
    document.getElementById('result-name').innerText = shop.name;
    const ratingVal = shop.rating ? shop.rating.toFixed(1) : "---";
    const starIcons = shop.rating ? "★".repeat(Math.floor(shop.rating)) : "";
    document.getElementById('rating-area').innerHTML = `${starIcons} <span style="font-size:0.9rem; margin-left:10px; color:#666;">Rating: ${ratingVal}</span>`;
    document.getElementById('recommend-menu').innerText = shop.menu;
    
    const hour = new Date().getHours();
    const isOpen = (hour >= shop.open && hour < shop.close);
    const statusBadge = document.getElementById('status-badge');
    statusBadge.innerText = isOpen ? "OPEN NOW" : "CLOSED";
    statusBadge.className = `status-badge ${isOpen ? 'open' : 'closed'}`;
    
    document.getElementById('tags').innerHTML = `<span class="tag">${shop.cat}</span><span class="tag">${shop.sub}</span><span class="tag">￥${shop.min.toLocaleString()}〜</span>`;
    document.getElementById('result-time').innerText = `🕒 Hours: ${shop.open}:00 〜 ${shop.close}:00`;

    const q = encodeURIComponent(shop.name + " 池袋");
    // 地図のグレースケールフィルタを削除し、カラーで表示
    document.getElementById('map-area').innerHTML = `<iframe src="https://maps.google.co.jp/maps?output=embed&q=${q}" style="width:100%; height:100%; border:none;"></iframe>`;
    
    if(window.innerWidth < 900) {
        window.scrollTo({ top: document.getElementById('result-container').offsetTop - 20, behavior: 'smooth' });
    }
}

function resetHistory() { sessionStorage.removeItem('lunch_history'); location.reload(); }
function updateHistoryCount(count) { document.getElementById('history-info').innerText = `Checked: ${count} shops`; }
updateHistoryCount(JSON.parse(sessionStorage.getItem('lunch_history') || "[]").length);
</script>
