<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>池袋1丁目ランチ プレミアム・エディション</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #e67e22; --accent: #d35400; --bg: #f5f6fa; }
        body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* 検索フォーム */
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        select, button { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        button { background: var(--main); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; grid-column: span 2; }
        button:hover { background: var(--accent); }

        /* ガチャ演出 */
        .slot-animation { animation: slot-blur 0.1s infinite; opacity: 0.7; color: #95a5a6 !important; }
        @keyframes slot-blur { 0% { transform: translateY(-2px); filter: blur(1px); } 100% { transform: translateY(2px); filter: blur(1px); } }
        .pop-in { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 結果表示 */
        #result-container { display: none; margin-top: 20px; }
        .result-layout { display: flex; flex-wrap: wrap; gap: 20px; text-align: left; }
        .info-panel { flex: 1; min-width: 300px; }
        .map-panel { flex: 1; min-width: 300px; height: 350px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        
        .shop-name { font-size: 1.6rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .budget-badge { display: inline-block; background: #2f3542; color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; margin-left: 10px; vertical-align: middle; }
        .recommend-box { background: #fff9f0; border-left: 5px solid var(--main); padding: 10px 15px; margin: 15px 0; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; margin-right: 5px; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0; color:var(--main);">📍 池袋1丁目ランチ ガチャ Premium</h2>
        <div class="search-grid">
            <div>
                <label>ジャンル</label>
                <select id="category">
                    <option value="any">なんでも</option>
                    <option value="イタリア料理">🇮🇹 イタリアン</option>
                    <option value="中華料理">🐼 中華・湖南料理</option>
                    <option value="レストラン">🍴 レストラン・洋食</option>
                    <option value="定食屋">🍚 定食・和食</option>
                    <option value="カフェ・喫茶">☕ カフェ</option>
                </select>
            </div>
            <div>
                <label>予算上限</label>
                <select id="budget">
                    <option value="99999">指定なし</option>
                    <option value="1000">1,000円以内</option>
                    <option value="2000">2,000円以内</option>
                    <option value="3000">3,000円以内</option>
                </select>
            </div>
            <button onclick="decideLunch()">運命の1店をガチャで決める！</button>
        </div>
    </div>

    <div id="result-container" class="card">
        <div class="result-layout">
            <div class="info-panel">
                <div id="result-name" class="shop-name"></div>
                <div id="tags"></div>
                <div class="recommend-box">
                    <div style="font-size: 0.8rem; color: #e67e22; font-weight: bold;">📋 お店の特徴・口コミ</div>
                    <div id="recommend-menu" style="font-size: 0.95rem; margin-top: 5px; line-height: 1.4;"></div>
                </div>
                <div id="result-time" style="font-size: 0.9rem; color: #666;"></div>
            </div>
            <div class="map-panel" id="map-area"></div>
        </div>
    </div>
</div>

<script>
    // スクレイピングデータを整形して投入
    const shops = [
        { name: "湘聚・湖南菜館", cat: "中華料理", min_price: 1000, max_price: 2000, rating: "4.8", info: "ランチも良く、しかも午後4時まで営業しています。", addr: "西池袋１丁目３８−５" },
        { name: "金のイタリアン", cat: "イタリア料理", min_price: 1000, max_price: 1500, rating: "4.3", info: "リラックスした空間で洗練された料理。ランチ待たずに入店できました。", addr: "東池袋１丁目１５−５" },
        { name: "Espresso D Works 池袋", cat: "カフェ・喫茶", min_price: 2000, max_price: 3000, rating: "4.5", info: "平日ランチコースが美味しく楽しめた。", addr: "東池袋１丁目３０−３" },
        { name: "楽楽屋 池袋本店", cat: "中華料理", min_price: 2000, max_price: 2500, rating: "4.1", info: "落ち着いた雰囲気のアジア料理。少し高めの予算が必要。", addr: "西池袋１丁目３６−４" },
        { name: "イケチカ ダイニング", cat: "レストラン", min_price: 1000, max_price: 2000, rating: "3.9", info: "小丼と蕎麦セットは種類も多くて美味しいです。", addr: "西池袋１丁目１−６" },
        { name: "ナポリの下町食堂池袋店", cat: "イタリア料理", min_price: 1000, max_price: 2000, rating: "3.8", info: "ランチは大盛り無料、サラダとドリンクバー付き。", addr: "西池袋１丁目１５−５" },
        { name: "三浦のハンバーグ", cat: "レストラン", min_price: 1000, max_price: 2000, rating: "4.1", info: "ご飯と味噌汁おかわり無料。コスパ最高。", addr: "東池袋１丁目２３−９" },
        { name: "神田たまごけん 池袋WACCA店", cat: "レストラン", min_price: 1000, max_price: 2000, rating: "4.6", info: "たまごけんプレートとミニサラダが人気。", addr: "東池袋１丁目８−１" },
        { name: "洋庖丁 池袋店", cat: "レストラン", min_price: 800, max_price: 1000, rating: "4.0", info: "ランチ～1,000円とコスパ重視層に強く響く設定。", addr: "池袋２丁目４１−６" },
        { name: "イタリアンダイニングDiletto", cat: "イタリア料理", min_price: 1200, max_price: 1500, rating: "4.5", info: "ランチパスタとサラダとドリンクがついて1200円。", addr: "池袋４丁目２６−１" },
        { name: "ランチハウス ミトヤ", cat: "定食屋", min_price: 800, max_price: 1000, rating: "4.0", info: "がっつり食べたいとき、真っ先に思い浮かぶお店。", addr: "西池袋３丁目３０−１０" },
        { name: "みなと", cat: "定食屋", min_price: 1000, max_price: 2000, rating: "3.8", info: "ランチで利用し、刺身定食が人気。", addr: "西池袋１丁目３７−１２" }
    ];

    function decideLunch() {
        const cat = document.getElementById('category').value;
        const budget = parseInt(document.getElementById('budget').value);
        
        let filtered = shops.filter(s => {
            const matchCat = (cat === 'any' || s.cat.includes(cat));
            const matchBudget = (s.min_price <= budget);
            return matchCat && matchBudget;
        });

        if (filtered.length === 0) { alert("条件に合うお店がありません！"); return; }

        const nameDisplay = document.getElementById('result-name');
        document.getElementById('result-container').style.display = 'block';
        nameDisplay.classList.add('slot-animation'); 
        
        let count = 0;
        const slotTimer = setInterval(() => {
            const randomFake = shops[Math.floor(Math.random() * shops.length)];
            nameDisplay.innerText = randomFake.name;
            count++;

            if (count > 15) {
                clearInterval(slotTimer);
                nameDisplay.classList.remove('slot-animation');
                const chosen = filtered[Math.floor(Math.random() * filtered.length)];
                
                // 紙吹雪を飛ばす！
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                
                nameDisplay.classList.add('pop-in');
                displayResult(chosen);
            }
        }, 80);
    }

    function displayResult(shop) {
        const priceText = `${shop.min_price.toLocaleString()}円〜${shop.max_price.toLocaleString()}円`;
        document.getElementById('result-name').innerHTML = `${shop.name} <span class="budget-badge">${priceText}</span>`;
        document.getElementById('recommend-menu').innerText = shop.info;
        document.getElementById('tags').innerHTML = `<span class="tag">${shop.cat}</span><span class="tag">⭐ ${shop.rating}</span>`;
        document.getElementById('result-time').innerHTML = `住所: ${shop.addr}`;

        const q = encodeURIComponent(shop.name + " 池袋");
        document.getElementById('map-area').innerHTML = `<iframe src="https://maps.google.co.jp/maps?output=embed&q=${q}"></iframe>`;
        window.scrollTo({ top: document.getElementById('result-container').offsetTop - 20, behavior: 'smooth' });
    }
</script>

</body>
</html>
