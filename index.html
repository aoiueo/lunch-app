<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日のお昼、どこ行く？</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
        background: #fdf6e3;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        margin: auto;
      }
      select,
      button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }
      button {
        background: #ff7f50;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background: #ff6347;
      }
      #result {
        margin-top: 20px;
        font-weight: bold;
        font-size: 1.2rem;
        color: #d35400;
        min-height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🍴 ランチ決定くん</h2>

      <label>何系？</label>
      <select id="type">
        <option value="米">米</option>
        <option value="パン">パン</option>
        <option value="麺">麺</option>
      </select>

      <label>距離は？</label>
      <select id="distance">
        <option value="近場">近場でサクッと</option>
        <option value="遠出">遠くまで行ける</option>
      </select>

      <label>気分は？</label>
      <select id="mood">
        <option value="ガッツリ">ガッツリ</option>
        <option value="あっさり">あっさり</option>
      </select>

      <button onclick="decideLunch()">運命の1店を決める！</button>

      <div id="result"></div>
    </div>

    <script>
      // お店のデータベース（ここを自由に編集してください）
     // 池袋1丁目1-7周辺の充実したお店データ（約30店）
    const shops = [
        // --- 麺類 (10店) ---
        { name: "鶏そば 壽（ことぶき）", type: "麺", distance: "近場", mood: "あっさり" },
        { name: "蒙古タンメン中本 池袋店", type: "麺", distance: "近場", mood: "ガッツリ" },
        { name: "麺屋武蔵 二天", type: "麺", distance: "近場", mood: "ガッツリ" },
        { name: "屯ちん 池袋本店", type: "麺", distance: "遠出", mood: "ガッツリ" },
        { name: "らーめん はやし田 池袋店", type: "麺", distance: "遠出", mood: "あっさり" },
        { name: "うどん 慎（西口・北口周辺のうどん屋）", type: "麺", distance: "近場", mood: "あっさり" },
        { name: "六坊担担面", type: "麺", distance: "遠出", mood: "ガッツリ" },
        { name: "銀座 篝 池袋店（鶏白湯）", type: "麺", distance: "遠出", mood: "あっさり" },
        { name: "油そば 鈴の木", type: "麺", distance: "近場", mood: "ガッツリ" },
        { name: "小諸そば 池袋店", type: "麺", distance: "近場", mood: "あっさり" },

        // --- 米（定食・丼・カレー） (12店) ---
        { name: "キッチンABC 西池袋店", type: "米", distance: "近場", mood: "ガッツリ" },
        { name: "しんぱち食堂 西池袋店", type: "米", distance: "近場", mood: "あっさり" },
        { name: "牛かつ もと村 池袋店", type: "米", distance: "遠出", mood: "ガッツリ" },
        { name: "大戸屋 ごはん処 池袋西口店", type: "米", distance: "近場", mood: "あっさり" },
        { name: "洋庖丁（よほうちょう）池袋店", type: "米", distance: "近場", mood: "ガッツリ" },
        { name: "カレーは飲み物。池袋店", type: "米", distance: "遠出", mood: "ガッツリ" },
        { name: "宮崎県日向市 じとっこ組合（ランチ定食）", type: "米", distance: "近場", mood: "ガッツリ" },
        { name: "おにぎり ぼんご（大塚方面だが池袋からも！）", type: "米", distance: "遠出", mood: "あっさり" },
        { name: "伝説のすた丼屋 池袋店", type: "米", distance: "近場", mood: "ガッツリ" },
        { name: "丸亀製麺 池袋店", type: "米", distance: "遠出", mood: "あっさり" },
        { name: "火星カレー", type: "米", distance: "遠出", mood: "ガッツリ" },
        { name: "ねぎし 池袋駅西口店", type: "米", distance: "近場", mood: "あっさり" },

        // --- パン（バーガー・サンドイッチ・カフェ） (8店) ---
        { name: "バーガーキング 池袋立教通り店", type: "パン", distance: "近場", mood: "ガッツリ" },
        { name: "メゾン・カイザー 池袋サンシャイン店", type: "パン", distance: "遠出", mood: "あっさり" },
        { name: "J.S. BURGERS CAFE 池袋店", type: "パン", distance: "遠出", mood: "ガッツリ" },
        { name: "タカセ 池袋本店（パン・軽食）", type: "パン", distance: "遠出", mood: "あっさり" },
        { name: "ウェンディーズ・ファーストキッチン 池袋北口店", type: "パン", distance: "近場", mood: "ガッツリ" },
        { name: "サンマルクカフェ 池袋メトロポリタン口店", type: "パン", distance: "遠出", mood: "あっさり" },
        { name: "フレッシュネスバーガー 池袋西口店", type: "パン", distance: "近場", mood: "ガッツリ" },
        { name: "コメダ珈琲店 西武池袋前店", type: "パン", distance: "遠出", mood: "ガッツリ" }
    ];

      function decideLunch() {
        const type = document.getElementById("type").value;
        const distance = document.getElementById("distance").value;
        const mood = document.getElementById("mood").value;

        // 条件に合うお店を絞り込む
        const filteredShops = shops.filter(
          (shop) =>
            shop.type === type &&
            shop.distance === distance &&
            shop.mood === mood,
        );

        const resultDiv = document.getElementById("result");

        if (filteredShops.length > 0) {
          // ランダムに1件選ぶ
          const chosen =
            filteredShops[Math.floor(Math.random() * filteredShops.length)];
          resultDiv.innerHTML = `今日のご飯は...<br>「${chosen.name}」です！`;
        } else {
          resultDiv.innerHTML = "条件に合うお店が見つかりませんでした...😂";
        }
      }
    </script>
  </body>
</html>
